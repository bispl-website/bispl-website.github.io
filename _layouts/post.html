layout: default

  <h1>{{ page.title }}</h1>
  <p>{{ page.date | date: "%B %-d, %Y" }}</p>
</div>
<section style="padding-top:10px">
  <div class="wrap">
    <div class="tl-body" style="font-size:15.5px; max-width:760px">{{ content }}</div>
    <p style="margin-top:28px"><a href="{{ '/' | relative_url }}">&larr; Back to news</a></p>
  </div>
</section>
